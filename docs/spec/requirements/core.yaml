category: Core CLI
prefix: REQ-CORE

requirements:
  - id: REQ-CORE-001
    title: Validate the layered specification graph
    description: |
      The `validate` command MUST load philosophy, policy, requirement, and
      feature YAML definitions, validate required fields, reject broken
      references, verify reciprocal links across the adjacent-layer graph, and
      enforce `planned` / `implemented` delivery-state rules for requirements
      and features. `check` MAY remain as a compatibility alias, but `validate`
      is the canonical command name.
    priority: high
    status: implemented
    linked_policies:
      - POL-001
      - POL-002
      - POL-003
    linked_features:
      - FEAT-CHECK-001
    tests:
      rust:
        - file: tests/check_command.rs
          symbols:
            - check_command_accepts_passing_workspace
            - check_command_reports_missing_definition_links
        - file: tests/status_validation.rs
          symbols:
            - validate_accepts_planned_entries_without_traces
            - validate_rejects_implemented_entries_without_traces
            - validate_rejects_planned_entries_with_traces
            - validate_rejects_planned_entries_when_config_disallows_them

  - id: REQ-CORE-002
    title: Verify multi-language traceability with language-aware inspection
    description: |
      The `validate` command MUST verify requirement-to-test and
      feature-to-implementation traceability in the languages used by `ugoite`
      today: Rust, Python, and TypeScript. For those languages, symbol and
      documentation inspection SHOULD use maintained parsers or language
      runtimes where practical. A declared trace is valid only when the file
      exists, the symbol exists, the file explicitly mentions the owning ID, and
      any `doc_contains` snippets are present in the symbol documentation.
    priority: high
    status: implemented
    linked_policies:
      - POL-003
    linked_features:
      - FEAT-CHECK-001
    tests:
      rust:
        - file: tests/check_command.rs
          symbols:
            - check_command_verifies_requirement_test_traceability_in_all_supported_languages
            - check_command_verifies_feature_implementation_traceability_in_all_supported_languages
        - file: tests/example_workspaces.rs
          symbols:
            - python_only_example_validates
            - polyglot_example_validates

  - id: REQ-CORE-003
    title: Support conservative autofix and config-driven default_fix
    description: |
      The `validate` command MUST provide a `--fix` mode that performs safe,
      mechanical repairs for documentation-style trace gaps. `syu.yaml` MUST be
      able to configure default fix behavior, and `--no-fix` MUST disable it.
      Autofix MUST stay conservative and avoid speculative structural edits.
    priority: high
    status: implemented
    linked_policies:
      - POL-003
    linked_features:
      - FEAT-CHECK-001
    tests:
      rust:
        - file: tests/validate_fix_command.rs
          symbols:
            - validate_fix_repairs_missing_trace_docs_for_rust_sources
            - validate_uses_config_default_fix_and_no_fix_disables_it

  - id: REQ-CORE-004
    title: Generate a Markdown validation report
    description: |
      The `report` command MUST reuse the same verification engine as `validate`
      and render a Markdown report that summarizes counts, failures, and
      corrective suggestions. It MUST support writing the report to stdout or a
      file path.
    priority: medium
    status: implemented
    linked_policies:
      - POL-005
    linked_features:
      - FEAT-REPORT-001
    tests:
      rust:
        - file: tests/report_command.rs
          symbols:
            - report_command_generates_markdown_output
            - report_command_writes_markdown_file

  - id: REQ-CORE-005
    title: Enforce repository quality gates
    description: |
      The repository MUST provide repeatable quality automation for formatting,
      linting, tests, workflow linting, pre-commit / pre-push hooks, and
      self-validation so `syu`'s own promises stay continuously checkable.
    priority: high
    status: implemented
    linked_policies:
      - POL-007
    linked_features:
      - FEAT-QUALITY-001
    tests:
      rust:
        - file: tests/repository_quality.rs
          symbols:
            - repository_declares_precommit_and_quality_gates

  - id: REQ-CORE-006
    title: Enforce 100 percent line coverage in CI
    description: |
      The repository MUST gate CI on 100 percent Rust line coverage using a
      repeatable command so regressions in verification logic remain visible.
    priority: high
    status: implemented
    linked_policies:
      - POL-007
    linked_features:
      - FEAT-QUALITY-001
    tests:
      rust:
        - file: tests/repository_quality.rs
          symbols:
            - repository_declares_coverage_gate_at_one_hundred_percent

  - id: REQ-CORE-007
    title: Automate releases with release-please and artifact packaging
    description: |
      The repository MUST provide release automation that prepares release PRs,
      supports alpha / beta / stable tracks, publishes GitHub release notes
      without a committed changelog file, and builds installable artifacts for
      supported platforms.
    priority: high
    status: implemented
    linked_policies:
      - POL-007
    linked_features:
      - FEAT-RELEASE-001
    tests:
      rust:
        - file: tests/repository_quality.rs
          symbols:
            - repository_declares_release_automation

  - id: REQ-CORE-008
    title: Provide a one-line installer for release artifacts
    description: |
      The repository MUST ship an installer script that resolves the current
      platform, downloads the matching GitHub release asset, defaults to
      `ugoite/syu`, and installs the binary into a user-controlled location.
    priority: medium
    status: implemented
    linked_policies:
      - POL-007
    linked_features:
      - FEAT-INSTALL-001
    tests:
      rust:
        - file: tests/repository_quality.rs
          symbols:
            - repository_declares_installer_contract

  - id: REQ-CORE-009
    title: Bootstrap a workspace with syu init and syu.yaml
    description: |
      The `init` command MUST create a starter `syu.yaml` whose version matches
      the running CLI and a valid `docs/spec/` tree whose starter requirements
      and features begin as `planned` so users can begin from a working
      structure instead of manually creating directories and placeholder YAML
      files.
    priority: high
    status: implemented
    linked_policies:
      - POL-001
      - POL-004
    linked_features:
      - FEAT-INIT-001
    tests:
      rust:
        - file: tests/init_command.rs
          symbols:
            - init_command_bootstraps_a_workspace_that_validate_accepts
            - init_command_requires_force_when_generated_files_exist

  - id: REQ-CORE-010
    title: Provide English documentation for concepts and workflows
    description: |
      The repository MUST explain philosophy, policy, requirements, and
      features in English, describe why each layer exists, document how to
      define them, explain `planned` / `implemented` delivery states, and show
      how to use `init`, `validate`, `report`, config, and autofix.
    priority: medium
    status: implemented
    linked_policies:
      - POL-001
      - POL-005
    linked_features:
      - FEAT-DOCS-001
    tests:
      rust:
        - file: tests/repository_quality.rs
          symbols:
            - repository_declares_documentation_guides

  - id: REQ-CORE-011
    title: Provide a contributor devcontainer
    description: |
      The repository MUST provide a devcontainer that installs the core
      contributor toolchain needed to work on `syu`, including Rust quality
      tooling and the runtimes used by the documented workflow.
    priority: medium
    status: implemented
    linked_policies:
      - POL-004
      - POL-006
    linked_features:
      - FEAT-CONTRIB-001
    tests:
      rust:
        - file: tests/repository_quality.rs
          symbols:
            - repository_declares_devcontainer_configuration

  - id: REQ-CORE-012
    title: Ship curated example workspaces and validate them in tests
    description: |
      The repository MUST include example projects for Rust-only, Python-only,
      and polyglot workflows and MUST validate them in the automated test suite
      so contributors can learn from working patterns.
    priority: medium
    status: implemented
    linked_policies:
      - POL-004
      - POL-005
      - POL-006
    linked_features:
      - FEAT-CONTRIB-001
    tests:
      rust:
        - file: tests/example_workspaces.rs
          symbols:
            - rust_only_example_validates
            - python_only_example_validates
            - polyglot_example_validates
        - file: tests/repository_quality.rs
          symbols:
            - repository_ships_example_workspaces
