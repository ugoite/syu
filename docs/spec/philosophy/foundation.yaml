category: Philosophy
version: 1
language: en

philosophies:
  - id: PHIL-001
    title: Philosophy should protect ideals while lower layers operationalize them
    product_design_principle: |
      Philosophy is the constitutional layer of a specification-driven project.
      It defines the ideal end-state and the values that should survive changing
      implementations, tools, and release cycles.
    coding_guideline: |
      Keep philosophy stable, value-oriented, and free from file-level trivia.
      Let policy, requirements, and features carry the operational detail.
    linked_policies:
      - POL-001
      - POL-002
      - POL-005

  - id: PHIL-002
    title: Requirements and features should be provable from repository contents
    product_design_principle: |
      A specification layer is trustworthy only when the repository can prove
      it. Requirements should point to tests, features should point to
      implementations, and validation should inspect real symbols rather than
      trusting filenames or YAML alone.
    coding_guideline: |
      Prefer maintained parsers or language runtimes for symbol and
      documentation inspection when the language can support them.
    linked_policies:
      - POL-003
      - POL-006
      - POL-007

  - id: PHIL-003
    title: Onboarding and explanation are product behavior
    product_design_principle: |
      A specification-driven tool fails if new contributors cannot start
      quickly or understand what each layer means. Bootstrapping, examples,
      and documentation are part of the product, not secondary assets.
    coding_guideline: |
      Treat scaffolding, guides, examples, and contributor tooling as
      first-class behavior that should be versioned and validated.
    linked_policies:
      - POL-001
      - POL-004
      - POL-005
      - POL-006

  - id: PHIL-004
    title: Self-hosting keeps the tool honest
    product_design_principle: |
      `syu` should use its own model. If the repository cannot validate its own
      policies, examples, automation, and release flow, the tool is asking more
      discipline from users than it requires from itself.
    coding_guideline: |
      Keep the command surface small, but make repository automation,
      contributor setup, and distribution explicit enough to self-validate.
    linked_policies:
      - POL-005
      - POL-006
      - POL-007
