category: Editor Integrations
version: 1

features:
  - id: FEAT-VSCODE-001
    title: VS Code navigation and diagnostics integration
    summary: Surface `syu` validation diagnostics and trace/navigation workflows directly inside VS Code.
    status: implemented
    linked_requirements:
      - REQ-CORE-022
    implementations:
      javascript:
        - file: editors/vscode/src/extension.js
          symbols:
            - activate
            - registerCommands
            - SyuContextTreeProvider
        - file: editors/vscode/src/model.js
          symbols:
            - loadSpecModel
            - lookupTrace
            - loadDiagnostics
      json:
        - file: editors/vscode/package.json
          symbols:
            - syu.refreshDiagnostics
            - syu.openSpecItemById
            - syu.showRelatedFilesForSpecId
            - syuContext
  - id: FEAT-VSCODE-002
    title: Editor-facing LSP server foundation
    summary: Provide an editor-agnostic LSP transport so VS Code and future clients can reuse syu hover and navigation semantics over stdio.
    status: implemented
    linked_requirements:
      - REQ-CORE-022
    implementations:
      rust:
        - file: src/lsp/mod.rs
          symbols:
            - run_lsp_server
        - file: src/lsp/server.rs
          symbols:
            - '*'
        - file: src/lsp/handlers.rs
          symbols:
            - '*'
        - file: src/lsp/protocol.rs
          symbols:
            - '*'
