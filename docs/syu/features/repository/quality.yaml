category: Quality Automation
version: 1

features:
  - id: FEAT-QUALITY-001
    title: Repository quality automation
    summary: Keep self-validation, dependency hygiene across Rust, GitHub Actions, the docs site, and the browser app, code scanning, and merge-queue-safe CI execution fast enough to run on every pull request.
    status: implemented
    linked_requirements:
      - REQ-CORE-005
      - REQ-CORE-006
      - REQ-CORE-014
    implementations:
      shell:
        - file: scripts/ci/quality-gates.sh
          symbols:
            - run_quality_gates
        - file: scripts/ci/coverage.sh
          symbols:
            - configure_llvm_tools
            - run_coverage
      yaml:
        - file: .pre-commit-config.yaml
          symbols:
            - syu-validate-self
            - syu-quality-gates
            - syu-coverage-gate
        - file: .github/workflows/ci.yml
          symbols:
            - merge_group
            - precommit
            - quality
            - coverage
            - actionlint
            - "./.github/actions/setup-rust"
            - taiki-e/cache-cargo-install-action@v3
            - "tool: cargo-llvm-cov"
            - "tool: cargo-audit"
            - Set up Python with pip cache
            - "cache-dependency-path: app/package-lock.json"
            - npm ci
            - Review dependency changes
        - file: .github/actions/setup-rust/action.yml
          symbols:
            - Restore Rust cache
            - Swatinem/rust-cache@v2
        - file: .github/actions/build-docs-site/action.yml
          symbols:
            - actions/setup-node@v6
            - "cache-dependency-path: website/package-lock.json"
            - npm ci
        - file: .github/workflows/codeql.yml
          symbols:
            - merge_group
            - Analyze (rust)
            - github/codeql-action/init@v4
        - file: .github/dependabot.yml
          symbols:
            - FEAT-QUALITY-001
            - package-ecosystem
            - target-branch
            - "directory: /website"
            - "directory: /app"
