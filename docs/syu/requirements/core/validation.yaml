category: Core Validation
prefix: REQ-CORE
requirements:
  - id: REQ-CORE-001
    title: Validate the linked specification graph with rule-backed diagnostics
    description: |
      The `validate` command MUST load philosophy, policy, requirement, and
      feature YAML definitions, validate required fields, reject broken
      references, verify reciprocal links across the adjacent-layer graph by
      default, reject duplicate adjacent-layer IDs inside a single relationship
      list, report isolated definitions by default, enforce `planned` /
      `implemented` delivery-state rules for requirements and features, warn
      when linked requirements and features drift apart semantically on delivery
      state, and surface rule codes with human-readable titles and explanations
      in validation output. It MUST also support optional filtered views by
      severity, rule genre, and exact rule code for both text and JSON output
      without changing the underlying validation result, and `syu.yaml` MUST be
      able to disable reciprocal-link enforcement without disabling missing-
      reference validation. `check` MAY remain as a compatibility alias, but
      `validate` is the canonical command name.
    priority: high
    status: implemented
    linked_policies:
      - POL-001
      - POL-002
    linked_features:
      - FEAT-CHECK-001
    tests:
      rust:
        - file: tests/check_command.rs
          symbols:
            - '*'
        - file: tests/validate_filter_command.rs
          symbols:
            - '*'
        - file: tests/duplicate_validation.rs
          symbols:
            - validate_reports_duplicate_relationship_entries
        - file: tests/status_validation.rs
          symbols:
            - '*'
        - file: tests/orphan_validation.rs
          symbols:
            - '*'
        - file: tests/reciprocal_validation.rs
          symbols:
            - '*'
        - file: tests/validate_override_command.rs
          symbols:
            - validate_cli_override_can_allow_planned_items
            - validate_cli_override_can_forbid_planned_items
            - validate_cli_override_for_planned_items_mentions_cli_source
            - validate_cli_override_can_disable_orphan_checks
            - validate_cli_override_can_disable_reciprocal_checks
        - file: src/command/check.rs
          symbols:
            - '*'
        - file: src/cli.rs
          symbols:
            - '*'
        - file: src/model.rs
          symbols:
            - '*'
        - file: src/rules.rs
          symbols:
            - '*'
        - file: src/workspace.rs
          symbols:
            - '*'
  - id: REQ-CORE-002
    title: Verify multi-language traces and optionally require full symbol ownership
    description: |
      The `validate` command MUST verify requirement-to-test and
      feature-to-implementation traceability in the languages used by `syu`
      today: Rust, Python, and TypeScript/JavaScript. A declared trace is valid
      only when the file exists, the symbol exists, the trace path uses
      canonical repository-relative form, and any `doc_contains` snippets are
      present in the symbol documentation when the declared language supports
      rich inspection. The checked-in trace mapping itself MUST remain enough
      to audit ownership without requiring inline requirement or feature IDs in
      implementation files by default.
      Validation MUST also reject duplicate trace mappings inside a single
      language list, support wildcard file ownership, and provide an optional
      mode that requires every public symbol (non-underscore-prefixed for Python,
      `pub` for Rust, exported for TypeScript/JavaScript) and every test symbol
      (`test_*` functions for Python, `#[test]` for Rust, `test*`-prefixed
      functions for TypeScript/JavaScript) in repository source and test roots
      to belong to some feature or requirement respectively. That inventory MUST
      ignore configured repository-relative generated paths, defaulting to common
      build outputs such as `app/dist`, `build/`, `coverage/`, `dist/`, and
      `target/` without hiding authored nested directories like `src/build/`.
    priority: high
    status: implemented
    linked_policies:
      - POL-003
      - POL-006
      - POL-008
    linked_features:
      - FEAT-CHECK-001
    tests:
      rust:
        - file: tests/check_command.rs
          symbols:
            - check_command_verifies_requirement_test_traceability_in_all_supported_languages
            - check_command_verifies_feature_implementation_traceability_in_all_supported_languages
            - check_command_accepts_trace_workspaces_without_inline_spec_ids
            - check_command_warns_for_non_canonical_relative_trace_paths
            - check_command_warns_for_backslash_trace_paths
        - file: tests/trace_coverage_validation.rs
          symbols:
            - '*'
        - file: tests/validate_override_command.rs
          symbols:
            - validate_cli_override_can_enable_symbol_trace_coverage
        - file: tests/duplicate_validation.rs
          symbols:
            - validate_reports_duplicate_trace_entries
        - file: src/coverage.rs
          symbols:
            - '*'
        - file: src/inspect.rs
          symbols:
            - '*'
        - file: src/language.rs
          symbols:
            - '*'
        - file: src/runtime.rs
          symbols:
            - '*'
        - file: tests/example_workspaces.rs
          symbols:
            - python_only_example_validates
            - polyglot_example_validates
      python:
        - file: tests/fixtures/workspaces/passing/python/test_traceability.py
          symbols:
