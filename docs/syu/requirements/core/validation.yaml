  - id: REQ-CORE-003
    title: Support conservative autofix and config-driven default_fix
    description: |
      The `validate` command MUST provide a `--fix` mode that performs safe,
      mechanical repairs for documentation-style trace gaps. `syu.yaml` MUST be
      able to configure default fix behavior, and `--no-fix` MUST disable it.
      Autofix MUST stay conservative, avoid speculative structural edits, and
      add optional documentation breadcrumbs without injecting bookkeeping spec
      IDs by default.
    priority: high
    status: implemented
    linked_policies:
      - POL-003
      - POL-008
    linked_features:
      - FEAT-CHECK-001
    tests:
      rust:
        - file: tests/validate_fix_command.rs
          symbols:
            - '*'
  - id: REQ-CORE-004
    title: Generate and preserve a Markdown validation report
    description: |
      The `report` command MUST reuse the same verification engine as `validate`
      and render a Markdown report that summarizes counts, failures, and
      corrective suggestions. It MUST support writing the report to stdout or a
      file path. `syu.yaml` MUST be able to define a default report output path
      that `--output` can still override. The self-hosted repository SHOULD keep
      a checked-in report artifact so contributors can inspect the current state
      without running the command first.
    priority: medium
    status: implemented
    linked_policies:
      - POL-002
      - POL-005
    linked_features:
      - FEAT-REPORT-001
    tests:
      rust:
        - file: tests/report_command.rs
          symbols:
            - '*'
        - file: tests/main_binary.rs
          symbols:
            - '*'
        - file: src/command/report.rs
          symbols:
            - '*'
        - file: src/report.rs
          symbols:
            - '*'
