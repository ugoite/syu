    linked_features:
      - FEAT-TRACE-002
    tests:
      python:
        - file: python/test_traceability.py
          symbols:
            - test_req_trace_py

  - id: REQ-TRACE-003
    title: TypeScript requirement trace
    description: TypeScript requirements should point to TypeScript test files.
    priority: high
    status: implemented
    linked_policies:
      - POL-TRACE-001
      - POL-TRACE-002
