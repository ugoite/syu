    description: Rust requirements should point to Rust test files.
    priority: high
    status: implemented
    linked_policies:
      - POL-TRACE-001
      - POL-TRACE-002
    linked_features:
      - FEAT-TRACE-001
    tests:
      rust:
        - file: src/rust_trace_tests.rs
          symbols:
            - req_trace_rust_test

  - id: REQ-TRACE-002
    title: Python requirement trace
    description: Python requirements should point to Python test files.
