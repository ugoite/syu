# FEAT-QUALITY-001
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      rust-crates:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /website
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      docs-site-npm:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /app
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      browser-app-npm:
        patterns:
          - "*"
