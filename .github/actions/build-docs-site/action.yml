# FEAT-DOCS-002 FEAT-QUALITY-001
name: Build docs site
description: Install dependencies and build the checked-in Docusaurus site

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "20"
        cache: npm
        cache-dependency-path: website/package-lock.json

    - name: Install docs dependencies
      shell: bash
      run: bash scripts/ci/install-docs-site-deps.sh

    - name: Build documentation site
      working-directory: website
      shell: bash
      run: npm run build
