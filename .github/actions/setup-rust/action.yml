# FEAT-QUALITY-001
name: Set up Rust toolchain
description: Install the Rust toolchain and restore the Swatinem build cache.

inputs:
  components:
    description: Comma-separated rustup components (e.g. "rustfmt,clippy")
    required: false
    default: ""
  targets:
    description: Comma-separated rustup targets (e.g. "wasm32-unknown-unknown")
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Set up Node.js for browser bundle builds
      uses: actions/setup-node@v6
      with:
        node-version: "25"
        cache: npm
        cache-dependency-path: app/package-lock.json

    - name: Install wasm-pack
      uses: taiki-e/cache-cargo-install-action@v3
      with:
        tool: wasm-pack

    - name: Restore Rust cache
      uses: Swatinem/rust-cache@v2
