name: export-app-dist-191

on:
  push:
    branches:
      - temp/export-dist-191

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-app-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: wasm-pack

      - name: Build browser app bundle
        shell: bash
        run: |
          cd app
          npm ci
          npm run build:wasm
          npm run check
          npm run build

      - name: Upload browser app bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-dist-191
          path: app/dist
