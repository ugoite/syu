# FEAT-QUALITY-001
name: ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Every Monday 06:00 UTC — weekly dependency drift detection

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt,clippy

      - name: Install cargo-llvm-cov
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-llvm-cov

      - name: Set up Python with pip cache
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: .pre-commit-config.yaml

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --hook-stage pre-commit

      - name: Run pre-push hooks
        run: pre-commit run --all-files --hook-stage pre-push

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt,clippy

      - name: Run quality gates
        run: scripts/ci/quality-gates.sh

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-llvm-cov
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-llvm-cov

      - name: Run line coverage
        run: scripts/ci/coverage.sh lcov

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: lcov
          path: target/coverage/lcov.info

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint workflows
        uses: rhysd/actionlint@v1.7.11

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-audit
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-audit

      - name: Run dependency audit
        run: cargo audit

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js (browser app)
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Audit browser app dependencies
        working-directory: app
        run: npm audit --audit-level=high

      - name: Set up Node.js (docs site)
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Audit docs site dependencies
        working-directory: website
        # Docusaurus 3.9.x transitive deps have high-severity advisories that
        # require a breaking downgrade to fix; use critical threshold until
        # Docusaurus ships a non-breaking fix upstream.
        run: npm audit --audit-level=critical

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6

      - name: Check dependency graph support
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/dependency-graph/sbom" >/dev/null 2>&1; then
            echo "enabled=true" >>"$GITHUB_OUTPUT"
          else
            echo "enabled=false" >>"$GITHUB_OUTPUT"
            echo "::notice title=dependency-review skipped::Enable Dependency graph in repository settings to activate dependency review."
          fi

      - name: Review dependency changes
        if: steps.dependency-graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4

  installer-smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel
          - macos-14
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python with pip cache
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: .pre-commit-config.yaml

      - name: Run installer smoke tests
        shell: bash
        run: scripts/ci/installer-smoke.sh

  docs-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build checked-in docs site
        uses: ./.github/actions/build-docs-site

  browser-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: wasm-pack

      - name: Install browser app dependencies
        working-directory: app
        run: npm ci

      - name: Check browser app
        working-directory: app
        run: |
          npm run build:wasm
          npm run check
          npm run build

      - name: Install Playwright browsers
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: app
        run: npm run test:e2e
        env:
          CI: "true"

  check-msrv:
    name: MSRV check (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check all targets on MSRV
        run: cargo check --all-targets
