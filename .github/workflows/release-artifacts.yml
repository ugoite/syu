# FEAT-RELEASE-001
name: release-artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to rebuild
        required: true
        type: string

concurrency:
  group: release-artifacts-${{ github.event.release.tag_name || inputs.tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  release-notes:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
      - name: Generate track-specific release notes
        shell: bash
        run: scripts/ci/release-track-notes.sh "${RELEASE_TAG}"

  release-artifacts:
    needs:
      - release-notes
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: syu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: syu
            cross_compile: true
            linker: aarch64-linux-gnu-gcc
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: syu
          - os: macos-14
            target: aarch64-apple-darwin
            binary: syu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: syu.exe
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
      PACKAGE_REGISTRY: ghcr.io
      PACKAGE_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: wasm-pack

      - name: Install cross-compilation toolchain (aarch64-linux-gnu)
        if: matrix.cross_compile == true
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu

      - name: Build release binary (cross-compile aarch64 linux)
        if: matrix.cross_compile == true
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release binary
        if: matrix.cross_compile != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release artifacts
        shell: bash
        run: |
          scripts/ci/package-release.sh \
            "${{ matrix.target }}" \
            "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            release-artifacts

      - name: Set up ORAS
        uses: oras-project/setup-oras@v2.0.0

      - name: Publish package artifacts
        shell: bash
        env:
          ORAS_USER: ${{ github.actor }}
          ORAS_PASSWORD: ${{ github.token }}
        run: |
          archive_name="syu-${{ matrix.target }}"
          case "${{ matrix.target }}" in
            *windows*) archive_name="${archive_name}.zip" ;;
            *) archive_name="${archive_name}.tar.gz" ;;
          esac
          echo "$ORAS_PASSWORD" | oras login "$PACKAGE_REGISTRY" --username "$ORAS_USER" --password-stdin
          scripts/ci/publish-package.sh \
            "$PACKAGE_REGISTRY" \
            "$PACKAGE_REPOSITORY" \
            "${RELEASE_TAG}__${{ matrix.target }}" \
            "release-artifacts/${archive_name}"

      - name: Include release installer
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: cp scripts/install-syu.sh release-artifacts/install-syu.sh

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd release-artifacts
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum ./* > checksums.sha256
          else
            shasum -a 256 ./* > checksums.sha256
          fi

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-artifacts/*

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release-artifacts/*
