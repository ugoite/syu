# FEAT-RELEASE-001
name: release-artifacts

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to rebuild
        required: true
        type: string

concurrency:
  group: release-artifacts-${{ github.event.release.tag_name || inputs.tag || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  release-artifacts:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: syu
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: syu
          - os: macos-14
            target: aarch64-apple-darwin
            binary: syu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: syu.exe
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
      PACKAGE_REGISTRY: ghcr.io
      PACKAGE_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release artifacts
        shell: bash
        run: |
          scripts/ci/package-release.sh \
            "${{ matrix.target }}" \
            "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            release-artifacts

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1.2.4

      - name: Publish package artifacts
        shell: bash
        env:
          ORAS_USER: ${{ github.actor }}
          ORAS_PASSWORD: ${{ github.token }}
        run: |
          archive_name="syu-${{ matrix.target }}"
          case "${{ matrix.target }}" in
            *windows*) archive_name="${archive_name}.zip" ;;
            *) archive_name="${archive_name}.tar.gz" ;;
          esac
          echo "$ORAS_PASSWORD" | oras login "$PACKAGE_REGISTRY" --username "$ORAS_USER" --password-stdin
          scripts/ci/publish-package.sh \
            "$PACKAGE_REGISTRY" \
            "$PACKAGE_REPOSITORY" \
            "${RELEASE_TAG}__${{ matrix.target }}" \
            "release-artifacts/${archive_name}"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release-artifacts/*
