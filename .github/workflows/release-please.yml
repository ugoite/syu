# FEAT-RELEASE-001
name: release-please

on:
  push:
    branches:
      - main
      - beta
      - alpha
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please-stable:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Run stable release-please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
  release-please-beta:
    if: github.ref_name == 'beta'
    runs-on: ubuntu-latest
    steps:
      - name: Run beta release-please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.beta.json
          manifest-file: .release-please-manifest.beta.json
  release-please-alpha:
    if: github.ref_name == 'alpha'
    runs-on: ubuntu-latest
    steps:
      - name: Run alpha release-please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.alpha.json
          manifest-file: .release-please-manifest.alpha.json
