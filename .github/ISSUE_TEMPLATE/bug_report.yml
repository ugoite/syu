# FEAT-CONTRIB-002
name: Bug report
description: Report a defect in syu, its documentation, or its repository automation.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to improve `syu`.
        Please include a minimal reproduction and the exact `syu` version when possible.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and the impact in one or two paragraphs.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: syu version
      description: "Example: `0.0.1-alpha.7` or `v0.0.1-alpha.4`"
      placeholder: 0.0.1-alpha.7
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include operating system, language runtimes, and install method if relevant.
      placeholder: macOS 15, Python 3.12, Node 22, installer script from README
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the exact commands, files, or repo layout needed to reproduce the issue.
      placeholder: |
        1. Run `syu init .`
        2. Edit `docs/syu/requirements/core/core.yaml`
        3. Run `syu validate .`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or failing output
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched for existing issues first.
          required: true
        - label: I can share a minimal reproduction if more detail is needed.
          required: true
